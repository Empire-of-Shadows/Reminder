<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Successful</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a3e 100%);
            border: 1px solid #4d0eb3;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(77, 14, 179, 0.4);
            text-align: center;
            max-width: 500px;
        }
        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.6));
        }
        h1 {
            color: #ffffff;
            margin-bottom: 10px;
        }
        p {
            color: #d1d5db;
            line-height: 1.6;
            margin: 10px 0;
        }
        .username {
            color: #8b5cf6;
            font-weight: bold;
        }
        strong {
            color: #a78bfa;
        }
        .close-btn {
            margin-top: 30px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #4d0eb3 0%, #6d28d9 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 0 20px rgba(77, 14, 179, 0.3);
        }
        .close-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(77, 14, 179, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Authorization Successful!</h1>
        <p>Welcome, <span class="username">$username</span>!</p>
        <p>You're now authorized to receive DM alerts from Imperial Reminder.</p>
        <p>You can now return to Discord and use <strong>/alerts join</strong> in any server.</p>
        <button class="close-btn" onclick="window.close()">Close This Window</button>
    </div>
</body>
</html>
