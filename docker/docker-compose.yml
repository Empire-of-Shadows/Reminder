name: Empire-Reminder
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GIT_REF=${GIT_REF:-Dev}
    env_file:
      - .env
    container_name: reminder
    image: imperial-reminder
    ports:
      - "50006:50006"  # Health check HTTP endpoint
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:50006/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - /mnt/4T/EmpireData/Reminder/Bot/logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - obsidian_grid

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        - GIT_REF=${GIT_REF:-Dev}
    env_file:
      - .env
    environment:
      - DASHBOARD_PORT=54006
    container_name: reminder-dashboard
    image: imperial-reminder-dashboard
    ports:
      - "54006:54006"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:54006/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - /mnt/4T/EmpireData/Reminder/Bot/logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - obsidian_grid

networks:
  obsidian_grid:
    external: true
